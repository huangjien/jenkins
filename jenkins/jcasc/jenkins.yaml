jenkins:
  systemMessage: "Jenkins managed by Configuration as Code"
  numExecutors: 2
  mode: NORMAL
  scmCheckoutRetryCount: 0
  remotingSecurity:
    enabled: true
  clouds:
    - docker:
        name: "local-docker"
        containerCapStr: "10"
        dockerApi:
          dockerHost:
            uri: "unix:///var/run/docker.sock"
        templates:
          - labelString: "docker"
            mode: EXCLUSIVE
            remoteFs: "/home/jenkins/agent"
            pullStrategy: PULL_ALWAYS
            connector:
              attach:
                user: "jenkins"
            dockerTemplateBase:
              image: "huangjien/jenkins:latest-jdk25"
              pullCredentialsId: "docker_token"

unclassified:
  location:
    url: "http://localhost:8888/"

# NOTE:
# - Live Jenkins currently uses GitHub OAuth + Matrix Auth.
# - Keep OAuth client ID/secret out of git and inject via secrets/ENV at deploy time.
