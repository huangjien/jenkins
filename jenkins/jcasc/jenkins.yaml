jenkins:
  systemMessage: "Jenkins managed by Configuration as Code"
  securityRealm:
    github:
      githubWebUri: "${GITHUB_WEB_URI:-https://github.com}"
      githubApiUri: "${GITHUB_API_URI:-https://api.github.com}"
      clientID: "${GITHUB_OAUTH_CLIENT_ID}"
      clientSecret: "${GITHUB_OAUTH_CLIENT_SECRET}"
      oauthScopes: "read:org,user:email"
  authorizationStrategy:
    globalMatrix:
      entries:
        - user:
            name: "${JENKINS_ADMIN_USER:-huangjien}"
            permissions:
              - "Overall/Administer"
        - group:
            name: "${JENKINS_DEVELOPER_GROUP:-authenticated}"
            permissions:
              - "Overall/Read"
              - "Job/Build"
              - "Job/Cancel"
              - "Job/Discover"
              - "Job/Read"
              - "Job/Workspace"
              - "View/Read"
  numExecutors: 2
  mode: NORMAL
  scmCheckoutRetryCount: 0
  remotingSecurity:
    enabled: true
  clouds:
    - docker:
        name: "local-docker"
        containerCap: 10
        dockerApi:
          dockerHost:
            uri: "unix:///var/run/docker.sock"
        templates:
          - labelString: "docker"
            mode: EXCLUSIVE
            remoteFs: "/home/jenkins/agent"
            pullStrategy: PULL_LATEST
            pullTimeout: 300
            removeVolumes: true
            connector:
              attach:
                user: "root"
            dockerTemplateBase:
              image: "huangjien/general-agent:latest"
              pullCredentialsId: "docker_token"
              user: "root"
              mounts:
                - "type=bind,source=/var/run/docker.sock,destination=/var/run/docker.sock"

unclassified:
  location:
    url: "${EXTERNAL_URL:-http://imac.tail94eaca.ts.net:8888/}"

# NOTE:
# - Keep OAuth client ID/secret out of git and inject them at deploy time.
# - JENKINS_DEVELOPER_GROUP may be `authenticated` or a GitHub org/team recognized by github-oauth.
