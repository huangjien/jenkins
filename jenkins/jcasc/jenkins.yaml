jenkins:
  systemMessage: "Jenkins managed by Configuration as Code"
  numExecutors: 2
  mode: NORMAL
  scmCheckoutRetryCount: 0
  remotingSecurity:
    enabled: true
  clouds:
    - docker:
        name: "local-docker"
        containerCap: 10
        dockerApi:
          dockerHost:
            uri: "unix:///var/run/docker.sock"
        templates:
          - labelString: "docker"
            mode: EXCLUSIVE
            remoteFs: "/home/jenkins/agent"
            pullStrategy: PULL_LATEST
            pullTimeout: 300
            removeVolumes: true
            connector:
              attach:
                user: "root"
            dockerTemplateBase:
              image: "huangjien/general-agent:latest"
              pullCredentialsId: "docker_token"
              user: "root"
              mounts:
                - "type=bind,source=/var/run/docker.sock,destination=/var/run/docker.sock"

unclassified:
  location:
    url: "http://localhost:8888/"

# NOTE:
# - Live Jenkins currently uses GitHub OAuth + Matrix Auth.
# - Keep OAuth client ID/secret out of git and inject via secrets/ENV at deploy time.
